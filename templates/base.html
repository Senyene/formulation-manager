<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulation Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    {% if current_user.is_authenticated %}
    <nav class="bg-blue-700 text-white p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="font-bold text-xl">🧪 Formulation Manager</span>
            <div class="flex items-center gap-4">
                <span>{{ current_user.display_name }} ({{ current_user.role.upper() }})</span>
                <a href="{{ url_for('logout') }}" class="bg-red-500 px-3 py-1 rounded hover:bg-red-600">Logout</a>
            </div>
        </div>
    </nav>
    {% endif %}
    
    <main class="max-w-6xl mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
